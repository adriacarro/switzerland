<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Suiza en Familia</title>
    <!--
      Redirección SPA para GitHub Pages (single-page-apps-for-github-pages, MIT).
      Convierte /switzerland/gastos en /switzerland/?/gastos y deja que index.html
      lo restaure. pathSegmentsToKeep = 1 porque es un "project page" bajo /switzerland/.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
